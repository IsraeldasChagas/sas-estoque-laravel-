<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ BOLETOS FUNCIONANDO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .status.success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .status.info { background: #d1ecf1; color: #0c5460; border: 2px solid #bee5eb; }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .card h3 { font-size: 0.9rem; margin-bottom: 10px; opacity: 0.9; }
        .card .value { font-size: 2rem; font-weight: bold; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }
        tr:hover { background: #f5f5f5; }
        
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }
        .status-a-vencer { background: #007bff; color: white; }
        .status-pago { background: #28a745; color: white; }
        .status-vencido { background: #dc3545; color: white; }
        .status-cancelado { background: #6c757d; color: white; }
        
        .log {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .log div { padding: 3px 0; }
        .log-success { color: #48bb78; }
        .log-error { color: #f56565; }
        .log-info { color: #4299e1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ TESTE DEFINITIVO - BOLETOS</h1>
        <p style="color: #666; margin-bottom: 20px;">Esta página carrega os boletos diretamente da API</p>
        
        <div>
            <button class="btn btn-success" onclick="carregarTudo()">🚀 CARREGAR BOLETOS</button>
            <button class="btn btn-primary" onclick="location.reload()">🔄 Recarregar Página</button>
        </div>
        
        <div id="status" class="status info">
            ⏳ Clique em "CARREGAR BOLETOS" para começar
        </div>
        
        <div class="cards" id="cards" style="display: none;">
            <div class="card">
                <h3>💳 Total de Boletos</h3>
                <div class="value" id="totalBoletos">0</div>
            </div>
            <div class="card">
                <h3>✅ Pagos</h3>
                <div class="value" id="totalPagos">0</div>
            </div>
            <div class="card">
                <h3>📅 A Vencer</h3>
                <div class="value" id="totalAVencer">0</div>
            </div>
            <div class="card">
                <h3>⚠️ Vencidos</h3>
                <div class="value" id="totalVencidos">0</div>
            </div>
        </div>
        
        <div class="log" id="log"></div>
        
        <div id="tabelaContainer"></div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        function log(msg, tipo = 'info') {
            const time = new Date().toLocaleTimeString();
            const logEl = document.getElementById('log');
            const div = document.createElement('div');
            div.className = `log-${tipo}`;
            div.textContent = `[${time}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(`[${tipo.toUpperCase()}] ${msg}`);
        }
        
        function setStatus(msg, tipo = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${tipo}`;
            statusEl.textContent = msg;
        }
        
        async function carregarTudo() {
            document.getElementById('log').innerHTML = '';
            log('🚀 Iniciando carregamento...', 'info');
            setStatus('🔄 Carregando...', 'info');
            
            try {
                // 1. Testar servidor
                log('1️⃣ Testando conexão com servidor...', 'info');
                const testResponse = await fetch(`${API_URL}/boletos`);
                log(`✅ Servidor respondeu: ${testResponse.status}`, 'success');
                
                if (!testResponse.ok) {
                    throw new Error(`Servidor retornou erro ${testResponse.status}`);
                }
                
                // 2. Carregar boletos
                log('2️⃣ Carregando boletos...', 'info');
                const boletos = await testResponse.json();
                log(`✅ ${boletos.length} boletos recebidos da API`, 'success');
                
                if (boletos.length === 0) {
                    setStatus('⚠️ Nenhum boleto encontrado no banco de dados', 'error');
                    return;
                }
                
                // 3. Contar por status
                const pagos = boletos.filter(b => b.status === 'PAGO').length;
                const aVencer = boletos.filter(b => b.status === 'A_VENCER').length;
                const vencidos = boletos.filter(b => b.status === 'VENCIDO').length;
                
                log(`📊 Pagos: ${pagos} | A Vencer: ${aVencer} | Vencidos: ${vencidos}`, 'info');
                
                // 4. Atualizar cards
                document.getElementById('cards').style.display = 'grid';
                document.getElementById('totalBoletos').textContent = boletos.length;
                document.getElementById('totalPagos').textContent = pagos;
                document.getElementById('totalAVencer').textContent = aVencer;
                document.getElementById('totalVencidos').textContent = vencidos;
                log('✅ Cards atualizados', 'success');
                
                // 5. Renderizar tabela
                log('3️⃣ Renderizando tabela...', 'info');
                renderTabela(boletos);
                log('✅ Tabela renderizada com sucesso!', 'success');
                
                setStatus(`✅ SUCESSO! ${boletos.length} boletos carregados e exibidos`, 'success');
                
            } catch (error) {
                log(`❌ ERRO: ${error.message}`, 'error');
                setStatus(`❌ ERRO: ${error.message}`, 'error');
                
                if (error.message.includes('Failed to fetch')) {
                    log('💡 SOLUÇÃO: Execute "cd backend && php artisan serve --port=5000"', 'info');
                }
            }
        }
        
        function renderTabela(boletos) {
            const container = document.getElementById('tabelaContainer');
            
            const statusMap = {
                'PAGO': { label: 'Pago', class: 'status-pago' },
                'A_VENCER': { label: 'A vencer', class: 'status-a-vencer' },
                'VENCIDO': { label: 'Vencido', class: 'status-vencido' },
                'CANCELADO': { label: 'Cancelado', class: 'status-cancelado' }
            };
            
            let html = '<table><thead><tr>';
            html += '<th>ID</th><th>Status</th><th>Fornecedor</th><th>Descrição</th>';
            html += '<th>Vencimento</th><th>Valor</th><th>Categoria</th>';
            html += '</tr></thead><tbody>';
            
            boletos.forEach(b => {
                const status = statusMap[b.status] || { label: b.status, class: 'status-cancelado' };
                html += '<tr>';
                html += `<td><strong>#${b.id}</strong></td>`;
                html += `<td><span class="status-pill ${status.class}">${status.label}</span></td>`;
                html += `<td>${b.fornecedor || '-'}</td>`;
                html += `<td>${b.descricao || '-'}</td>`;
                html += `<td>${formatDate(b.data_vencimento)}</td>`;
                html += `<td><strong>R$ ${parseFloat(b.valor || 0).toFixed(2)}</strong></td>`;
                html += `<td>${b.categoria || '-'}</td>`;
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('pt-BR');
        }
        
        // Carrega automaticamente ao abrir a página
        window.addEventListener('load', () => {
            log('🌐 Página carregada', 'info');
            log('📍 API URL: ' + API_URL, 'info');
            setTimeout(() => carregarTudo(), 500);
        });
    </script>
</body>
</html>
