<section id="relatoriosSection" class="view-section hidden">
  <form id="relatorioFilterForm" class="filters-panel">
    <div class="filters-grid">
      <label>
        Agrupar por
        <select id="relatorioAgrupar" name="agrupar">
          <option value="produto">Produto</option>
          <option value="unidade">Unidade</option>
          <option value="responsavel">Responsavel</option>
        </select>
      </label>
      <label>
        Tipo
        <select id="relatorioTipo" name="tipo">
          <option value="">Todos</option>
          <option value="ENTRADA">Entrada</option>
          <option value="SAIDA">Saida</option>
          <option value="TRANSFERENCIA">Transferencia</option>
          <option value="AJUSTE">Ajuste</option>
          <option value="PERDA">Perda</option>
        </select>
      </label>
      <label>
        Produto
        <select id="relatorioProduto" name="produto_id">
          <option value="">Todos</option>
        </select>
      </label>
      <label>
        Unidade
        <select id="relatorioUnidade" name="unidade_id">
          <option value="">Todas</option>
        </select>
      </label>
      <label>
        Data inicial
        <input type="date" id="relatorioDataDe" name="data_ini" />
      </label>
      <label>
        Data final
        <input type="date" id="relatorioDataAte" name="data_fim" />
      </label>
    </div>
    <div class="filters-actions">
      <button type="submit" class="btn primary">Gerar relatorio</button>
      <button type="button" class="btn" id="relatorioLimpar">Limpar</button>
    </div>
  </form>

  <div class="report-actions">
    <button type="button" class="btn secondary" id="relatorioExportCsv">Exportar CSV</button>
    <button type="button" class="btn secondary" id="relatorioExportPdf">Exportar PDF</button>
  </div>

  <div class="relatorios-grid">
    <div class="table-card form-card--wide">
      <header>Resumo por agrupador</header>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th id="relResumoColuna">Agrupador</th>
              <th>Entradas (Qtd)</th>
              <th>Entradas (Valor)</th>
              <th>Saidas (Qtd)</th>
              <th>Saidas (Valor)</th>
              <th>Saldo (Qtd)</th>
            </tr>
          </thead>
          <tbody id="relatorioResumoTable">
            <tr>
              <td colspan="6" style="text-align: center; color: #607d8b">Utilize os filtros para gerar o relatorio.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="table-card form-card--wide">
      <header>Movimentacoes detalhadas</header>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Tipo</th>
              <th>Produto</th>
              <th>Unidade</th>
              <th>Quantidade</th>
              <th>Motivo</th>
              <th>Responsavel</th>
            </tr>
          </thead>
          <tbody id="relatorioDetalhesTable">
            <tr>
              <td colspan="7" style="text-align: center; color: #607d8b">Utilize os filtros para gerar o relatorio.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
